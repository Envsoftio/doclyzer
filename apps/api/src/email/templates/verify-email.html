<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your email</title>
</head>
<body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #333; max-width: 560px; margin: 0 auto; padding: 24px;">
  <h1 style="font-size: 1.5rem; margin-bottom: 16px;">Verify your email</h1>
  <p>Hi {{userName}},</p>
  <p>Click the link below to verify your email address. This link expires in {{expiryMinutes}} minutes.</p>
  <p><a href="{{verifyLink}}" style="display: inline-block; padding: 12px 24px; background: #0A7C8C; color: #fff; text-decoration: none; border-radius: 8px;">Verify email</a></p>
  <p>Or copy and paste this URL into your browser:</p>
  <p style="word-break: break-all; font-size: 0.9rem;">{{verifyLink}}</p>
  <p>If you didn’t request this, you can ignore this email.</p>
  <p>- The Doclyzer team</p>
</body>
</html>
