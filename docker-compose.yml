name: doclyzer

services:
  api:
    image: node:24-alpine
    container_name: doclyzer-api
    working_dir: /workspace/apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-doclyzer}:${POSTGRES_PASSWORD:-doclyzer_dev_password}@postgres:5432/${POSTGRES_DB:-doclyzer}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      HOST: 0.0.0.0
    command: >
      sh -c "npm install && npm run migration:run && npm run start:dev -- --host 0.0.0.0"
    ports:
      - "4000:4000"
    volumes:
      - ./:/workspace
      - api_node_modules:/workspace/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docling:
        condition: service_started
    restart: unless-stopped
    networks:
      - doclyzer_net

  postgres:
    image: postgres:16-alpine
    container_name: doclyzer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doclyzer}
      POSTGRES_USER: ${POSTGRES_USER:-doclyzer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doclyzer_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - doclyzer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doclyzer} -d ${POSTGRES_DB:-doclyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doclyzer_net

  redis:
    image: redis:7-alpine
    container_name: doclyzer-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - doclyzer_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doclyzer_net

  docling:
    image: quay.io/docling-project/docling-serve-cpu:latest
    ports:
      - "5001:5001"
    environment:
      - DOCLING_NUM_THREADS=2
    restart: unless-stopped
    networks:
      - doclyzer_net

volumes:
  api_node_modules:
  doclyzer_postgres_data:
  doclyzer_redis_data:

networks:
  doclyzer_net:
    driver: bridge
