name: doclyzer

services:
  postgres:
    image: postgres:16-alpine
    container_name: doclyzer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doclyzer}
      POSTGRES_USER: ${POSTGRES_USER:-doclyzer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doclyzer_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - doclyzer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doclyzer} -d ${POSTGRES_DB:-doclyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doclyzer_net

  redis:
    image: redis:7-alpine
    container_name: doclyzer-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - doclyzer_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doclyzer_net

  adminer:
    image: adminer:4
    container_name: doclyzer-adminer
    restart: unless-stopped
    profiles: ["ops"]
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doclyzer_net

volumes:
  doclyzer_postgres_data:
  doclyzer_redis_data:

networks:
  doclyzer_net:
    driver: bridge
